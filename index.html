<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Workout Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #6ee7b7;
      --accent2: #34d399;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #f87171;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT ===== */
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    .tab-bar {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
      order: 99;
    }
    .tab-bar button {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 0; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 10px;
      transition: color 0.15s;
    }
    .tab-bar button.active { color: var(--accent); }
    .tab-bar button svg { width: 22px; height: 22px; }

    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    .screen-header {
      padding: 16px 16px 12px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .screen-header h1 { font-size: 22px; font-weight: 700; }
    .screen-header .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px; }

    /* ===== TODAY SCREEN ===== */
    .date-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border-radius: 20px;
      padding: 4px 12px; font-size: 13px; color: var(--muted);
      margin-bottom: 16px;
    }

    .exercise-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
      position: relative;
    }
    .exercise-card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .exercise-name { font-size: 16px; font-weight: 600; }
    .exercise-tag {
      font-size: 11px; background: rgba(110,231,183,0.12); color: var(--accent);
      border-radius: 6px; padding: 2px 7px;
    }
    .exercise-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .set-pill {
      background: var(--surface2); border-radius: 8px;
      padding: 4px 10px; font-size: 13px; color: var(--text);
    }
    .set-pill span { color: var(--accent); font-weight: 600; }
    .exercise-memo {
      margin-top: 8px; font-size: 13px; color: var(--muted);
      border-left: 2px solid var(--border); padding-left: 8px;
    }
    .card-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px;
    }
    .card-actions button {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--muted); border-radius: 6px;
    }
    .card-actions button:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

    .add-btn {
      width: 100%; padding: 14px; background: var(--surface);
      border: 2px dashed var(--border); border-radius: var(--radius);
      color: var(--accent); font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: background 0.15s, border-color 0.15s;
    }
    .add-btn:active { background: var(--surface2); border-color: var(--accent); }

    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--muted);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ===== HISTORY SCREEN ===== */
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; margin-bottom: 14px;
    }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; flex: 1;
    }
    .search-box input::placeholder { color: var(--muted); }

    .history-day {
      margin-bottom: 20px;
    }
    .history-day-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .history-day-date { font-weight: 700; font-size: 15px; }
    .history-day-count {
      font-size: 12px; color: var(--muted);
      background: var(--surface2); border-radius: 10px; padding: 2px 8px;
    }
    .history-exercise-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .history-exercise-row:active { border-color: var(--accent); }
    .history-exercise-name { font-weight: 600; font-size: 14px; }
    .history-exercise-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .search-highlight { background: rgba(110,231,183,0.25); border-radius: 3px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .form-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-size: 15px; outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--accent); }

    /* Date input color fix */
    input[type="date"].form-input::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }

    .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .quick-tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px; font-size: 13px;
      cursor: pointer; color: var(--muted); transition: all 0.15s;
    }
    .quick-tag:active, .quick-tag.selected {
      background: rgba(110,231,183,0.15); border-color: var(--accent); color: var(--accent);
    }

    .sets-area { display: flex; flex-direction: column; gap: 8px; }
    .set-row { display: flex; gap: 8px; align-items: center; }
    .set-row .set-num { font-size: 13px; color: var(--muted); width: 28px; flex-shrink: 0; }
    .set-row .form-input { flex: 1; padding: 8px 10px; font-size: 14px; text-align: center; }
    .set-row .remove-set {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 0 4px; line-height: 1;
    }
    .add-set-btn {
      width: 100%; padding: 8px; background: var(--surface2);
      border: 1px dashed var(--border); border-radius: 8px;
      color: var(--muted); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancel {
      flex: 1; padding: 13px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 15px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 13px; background: var(--accent); border: none;
      border-radius: 12px; color: #000; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-save:active { background: var(--accent2); }

    /* ===== STATS SCREEN ===== */
    .stats-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .stats-card-title { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stats-card-value { font-size: 32px; font-weight: 700; color: var(--accent); }
    .stats-card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stats-small { font-size: 24px; }

    .exercise-freq-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .exercise-freq-item:last-child { border-bottom: none; }
    .freq-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .freq-bar {
      height: 4px; border-radius: 2px; background: var(--accent);
      min-width: 4px; transition: width 0.3s;
    }
    .freq-count { font-size: 13px; color: var(--muted); }

    /* ===== WEEKLY GRID ===== */
    .week-grid {
      display: flex; gap: 4px; margin-top: 12px;
    }
    .week-day-cell {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .week-day-label { font-size: 10px; color: var(--muted); }
    .week-day-dot {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--muted);
    }
    .week-day-dot.trained {
      background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700;
    }
    .week-day-dot.today-ring {
      border-color: var(--accent);
    }

    /* ===== BACKUP/IMPORT ===== */
    .backup-btns { display: flex; gap: 8px; margin-top: 8px; }
    .btn-backup {
      flex: 1; padding: 11px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface2);
    }
    .btn-export { color: var(--accent); }
    .btn-import { color: var(--text); }
  </style>
</head>
<body>
<div id="app">

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="screen-header">
      <h1>今日のトレーニング</h1>
      <div class="sub" id="today-date-label"></div>
    </div>
    <div class="scroll-area" id="today-scroll">
      <div id="today-exercises"></div>
      <button class="add-btn" onclick="openAddModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        種目を追加
      </button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="screen-header">
      <h1>履歴</h1>
      <div class="sub">過去のトレーニング記録</div>
    </div>
    <div class="scroll-area">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="種目名で検索..." oninput="renderHistory()">
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- STATS -->
  <div class="screen" id="screen-stats">
    <div class="screen-header">
      <h1>統計</h1>
      <div class="sub">トレーニングの記録まとめ</div>
    </div>
    <div class="scroll-area" id="stats-area"></div>
  </div>

  <!-- TAB BAR -->
  <nav class="tab-bar">
    <button class="active" onclick="switchTab('today')" id="tab-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      今日
    </button>
    <button onclick="switchTab('history')" id="tab-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      履歴
    </button>
    <button onclick="switchTab('stats')" id="tab-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      統計
    </button>
  </nav>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">種目を追加</div>

    <div class="form-group">
      <label class="form-label">日付</label>
      <input class="form-input" id="input-date" type="date">
    </div>

    <div class="form-group">
      <label class="form-label">種目名</label>
      <input class="form-input" id="input-name" type="text" placeholder="例: ベンチプレス">
      <div class="quick-tags" id="quick-tags"></div>
    </div>

    <div class="form-group">
      <label class="form-label">セット詳細（回数 × 重量kg）</label>
      <div class="sets-area" id="sets-area"></div>
      <button class="add-set-btn" onclick="addSetRow()" style="margin-top:8px">
        + セットを追加
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">メモ</label>
      <input class="form-input" id="input-memo" type="text" placeholder="体調・気づきなど">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveExercise()">保存</button>
    </div>
  </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(this)">

<script>
// ===== DATA =====
const STORAGE_KEY = 'workout_log_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function todayKey() {
  const d = new Date();
  return dateToKey(d);
}

function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateJP(key) {
  const [y, m, d] = key.split('-');
  const date = new Date(+y, +m-1, +d);
  const days = ['日','月','火','水','木','金','土'];
  return `${y}年${+m}月${+d}日（${days[date.getDay()]}）`;
}

// Returns the Monday of the week containing `date`
function getMondayOfWeek(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

// ===== QUICK TAGS =====
const QUICK_EXERCISES = [
  'ベンチプレス','スクワット','デッドリフト','懸垂','ショルダープレス',
  'ダンベルカール','トライセプス','レッグプレス','ラットプルダウン','ケーブルロウ',
  'チェストフライ','サイドレイズ','腹筋','プランク','ランニング'
];

// ===== MODAL STATE =====
let editingDate = null;
let editingIndex = null;

function openAddModal(date, idx) {
  date = date || todayKey();
  idx = (idx !== undefined && idx !== null) ? idx : null;
  editingDate = date;
  editingIndex = idx;

  document.getElementById('modal-title').textContent = idx !== null ? '種目を編集' : '種目を追加';
  document.getElementById('input-date').value = date;

  // Quick tags
  const qt = document.getElementById('quick-tags');
  qt.innerHTML = '';
  QUICK_EXERCISES.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'quick-tag';
    btn.textContent = e;
    btn.addEventListener('click', () => selectQuickTag(btn, e));
    qt.appendChild(btn);
  });

  let name = '', memo = '';
  let sets = [{reps:'',weight:''}];

  if (idx !== null) {
    const data = loadData();
    const ex = data[editingDate]?.[idx];
    if (ex) { name = ex.name; memo = ex.memo || ''; sets = ex.sets?.length ? ex.sets : sets; }
  }

  document.getElementById('input-name').value = name;
  document.getElementById('input-memo').value = memo;
  renderSetRows(sets);

  if (name) {
    qt.querySelectorAll('.quick-tag').forEach(btn => {
      if (btn.textContent === name) btn.classList.add('selected');
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function selectQuickTag(btn, name) {
  document.querySelectorAll('.quick-tag').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('input-name').value = name;
}

// ===== SET ROWS =====
function renderSetRows(sets) {
  const area = document.getElementById('sets-area');
  area.innerHTML = '';
  sets.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'set-row';
    row.dataset.idx = i;

    const numSpan = document.createElement('span');
    numSpan.className = 'set-num';
    numSpan.textContent = i + 1;

    const repsInput = document.createElement('input');
    repsInput.className = 'form-input';
    repsInput.type = 'number';
    repsInput.inputMode = 'decimal';
    repsInput.placeholder = '回数';
    repsInput.value = s.reps;
    repsInput.min = '1';
    repsInput.style.textAlign = 'center';

    const sep = document.createElement('span');
    sep.style.cssText = 'color:var(--muted);font-size:13px';
    sep.textContent = '×';

    const weightInput = document.createElement('input');
    weightInput.className = 'form-input';
    weightInput.type = 'number';
    weightInput.inputMode = 'decimal';
    weightInput.placeholder = 'kg';
    weightInput.value = s.weight;
    weightInput.min = '0';
    weightInput.step = '0.5';
    weightInput.style.textAlign = 'center';

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-set';
    removeBtn.title = '削除';
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', () => removeSetRow(i));

    row.appendChild(numSpan);
    row.appendChild(repsInput);
    row.appendChild(sep);
    row.appendChild(weightInput);
    row.appendChild(removeBtn);
    area.appendChild(row);
  });
}

function getSetRowsData() {
  return Array.from(document.querySelectorAll('#sets-area .set-row')).map(row => {
    const inputs = row.querySelectorAll('input');
    return { reps: inputs[0].value, weight: inputs[1].value };
  });
}

function addSetRow() {
  const current = getSetRowsData();
  current.push({ reps: '', weight: '' });
  renderSetRows(current);
}

function removeSetRow(idx) {
  let current = getSetRowsData();
  if (current.length <= 1) return;
  current.splice(idx, 1);
  renderSetRows(current);
}

// ===== SAVE =====
function saveExercise() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('input-name').focus(); return; }

  const newDate = document.getElementById('input-date').value;
  if (!newDate || !/^\d{4}-\d{2}-\d{2}$/.test(newDate)) {
    document.getElementById('input-date').focus(); return;
  }

  const sets = getSetRowsData().filter(s => s.reps || s.weight);
  if (!sets.length) sets.push({ reps: '', weight: '' });

  const memo = document.getElementById('input-memo').value.trim();
  const data = loadData();

  // Remove from old date if editing and date changed
  if (editingIndex !== null && newDate !== editingDate) {
    if (data[editingDate]) {
      data[editingDate].splice(editingIndex, 1);
      if (!data[editingDate].length) delete data[editingDate];
    }
    editingDate = newDate;
    editingIndex = null; // treat as new entry at new date
  }

  if (!data[editingDate]) data[editingDate] = [];

  const entry = { name, sets, memo, ts: Date.now() };

  if (editingIndex !== null) {
    data[editingDate][editingIndex] = entry;
  } else {
    data[editingDate].push(entry);
  }

  saveData(data);
  closeModal();
  renderToday();
  renderHistory();
  renderStats();
}

// ===== DELETE =====
function deleteExercise(date, idx) {
  if (!confirm('この種目を削除しますか？')) return;
  const data = loadData();
  data[date].splice(idx, 1);
  if (!data[date].length) delete data[date];
  saveData(data);
  renderToday();
  renderHistory();
  renderStats();
}

// ===== FORMAT SET DISPLAY =====
function formatSets(sets) {
  if (!sets?.length) return '';
  return sets.filter(s => s.reps || s.weight).map(s => {
    const r = esc(s.reps), w = esc(s.weight);
    if (s.reps && s.weight) return `<span>${r}回</span> × <span>${w}kg</span>`;
    if (s.reps) return `<span>${r}回</span>`;
    if (s.weight) return `<span>${w}kg</span>`;
    return '';
  }).filter(Boolean).join('　');
}

function formatSetsShort(sets) {
  if (!sets?.length) return '';
  const valid = sets.filter(s => s.reps || s.weight);
  if (!valid.length) return '';
  return valid.map(s => [s.reps ? esc(s.reps)+'回' : '', s.weight ? esc(s.weight)+'kg' : ''].filter(Boolean).join('×')).join('  ');
}

// ===== RENDER TODAY =====
function renderToday() {
  const key = todayKey();
  const data = loadData();
  const exercises = data[key] || [];

  document.getElementById('today-date-label').textContent = formatDateJP(key);

  const container = document.getElementById('today-exercises');

  if (!exercises.length) {
    container.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="emoji">💪</div>';
    const p = document.createElement('p');
    p.textContent = 'まだ種目がありません。「種目を追加」から今日のトレーニングを記録しましょう！';
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }

  container.innerHTML = '';
  exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const editBtn = document.createElement('button');
    editBtn.title = '編集';
    editBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    editBtn.addEventListener('click', () => openAddModal(key, i));

    const delBtn = document.createElement('button');
    delBtn.title = '削除';
    delBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
    delBtn.addEventListener('click', () => deleteExercise(key, i));

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    const header = document.createElement('div');
    header.className = 'exercise-card-header';
    const nameEl = document.createElement('div');
    nameEl.className = 'exercise-name';
    nameEl.textContent = ex.name;
    header.appendChild(nameEl);

    const setsEl = document.createElement('div');
    setsEl.className = 'exercise-sets';
    const validSets = (ex.sets || []).filter(s => s.reps || s.weight);
    if (validSets.length) {
      validSets.forEach((s, si) => {
        const pill = document.createElement('div');
        pill.className = 'set-pill';
        const reps = s.reps ? esc(s.reps) + '回' : '-';
        const weight = s.weight ? esc(s.weight) + 'kg' : '';
        pill.innerHTML = `${si+1}set　<span>${reps}　${weight}</span>`;
        setsEl.appendChild(pill);
      });
    } else {
      const none = document.createElement('div');
      none.style.cssText = 'font-size:13px;color:var(--muted)';
      none.textContent = 'セット未登録';
      setsEl.appendChild(none);
    }

    card.appendChild(actions);
    card.appendChild(header);
    card.appendChild(setsEl);

    if (ex.memo) {
      const memo = document.createElement('div');
      memo.className = 'exercise-memo';
      memo.textContent = ex.memo;
      card.appendChild(memo);
    }

    container.appendChild(card);
  });
}

// ===== RENDER HISTORY =====
function renderHistory() {
  const query = document.getElementById('search-input')?.value.trim().toLowerCase() || '';
  const data = loadData();
  const keys = Object.keys(data).sort().reverse();

  const container = document.getElementById('history-list');

  if (!keys.length) {
    container.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="emoji">📋</div>';
    const p = document.createElement('p');
    p.textContent = 'まだ記録がありません';
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }

  container.innerHTML = '';
  let found = false;

  for (const key of keys) {
    const exercises = data[key] || [];
    const filtered = query
      ? exercises.filter(ex => ex.name.toLowerCase().includes(query))
      : exercises;

    if (!filtered.length) continue;
    found = true;

    const dayEl = document.createElement('div');
    dayEl.className = 'history-day';

    const dayHeader = document.createElement('div');
    dayHeader.className = 'history-day-header';
    const dateSpan = document.createElement('span');
    dateSpan.className = 'history-day-date';
    dateSpan.textContent = formatDateJP(key);
    const countSpan = document.createElement('span');
    countSpan.className = 'history-day-count';
    countSpan.textContent = filtered.length + '種目';
    dayHeader.appendChild(dateSpan);
    dayHeader.appendChild(countSpan);
    dayEl.appendChild(dayHeader);

    filtered.forEach(ex => {
      const realIdx = exercises.indexOf(ex);
      const row = document.createElement('div');
      row.className = 'history-exercise-row';
      row.addEventListener('click', () => openAddModal(key, realIdx));

      const nameEl = document.createElement('div');
      nameEl.className = 'history-exercise-name';

      if (query) {
        // Highlight matching text safely using text node + mark element
        const lowerName = ex.name.toLowerCase();
        const lowerQuery = query.toLowerCase();
        let lastIdx = 0;
        let pos;
        const frag = document.createDocumentFragment();
        while ((pos = lowerName.indexOf(lowerQuery, lastIdx)) !== -1) {
          if (pos > lastIdx) frag.appendChild(document.createTextNode(ex.name.slice(lastIdx, pos)));
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = ex.name.slice(pos, pos + query.length);
          frag.appendChild(mark);
          lastIdx = pos + query.length;
        }
        if (lastIdx < ex.name.length) frag.appendChild(document.createTextNode(ex.name.slice(lastIdx)));
        nameEl.appendChild(frag);
      } else {
        nameEl.textContent = ex.name;
      }

      const detailEl = document.createElement('div');
      detailEl.className = 'history-exercise-detail';
      const setsText = ex.sets?.filter(s=>s.reps||s.weight).length
        ? ex.sets.filter(s=>s.reps||s.weight).map(s => [s.reps ? s.reps+'回' : '', s.weight ? s.weight+'kg' : ''].filter(Boolean).join('×')).join('  ')
        : 'セット未登録';
      detailEl.textContent = setsText + (ex.memo ? '　📝 ' + ex.memo : '');

      row.appendChild(nameEl);
      row.appendChild(detailEl);
      dayEl.appendChild(row);
    });

    container.appendChild(dayEl);
  }

  if (!found) {
    container.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="emoji">🔍</div>';
    const p = document.createElement('p');
    p.textContent = `「${query}」に一致する記録が見つかりませんでした`;
    empty.appendChild(p);
    container.appendChild(empty);
  }
}

// ===== VOLUME CALCULATION =====
function calcVolume(dataSubset) {
  let vol = 0;
  for (const exList of Object.values(dataSubset)) {
    for (const ex of exList) {
      for (const s of (ex.sets || [])) {
        const r = parseFloat(s.reps) || 0;
        const w = parseFloat(s.weight) || 0;
        if (r > 0 && w > 0) vol += r * w;
      }
    }
  }
  return Math.round(vol * 10) / 10;
}

function fmtNum(n) {
  return n.toLocaleString('ja-JP');
}

// ===== RENDER STATS =====
function renderStats() {
  const data = loadData();
  const keys = Object.keys(data);

  const totalDays = keys.length;
  let totalExercises = 0;
  let totalSets = 0;
  const freqMap = {};

  for (const key of keys) {
    for (const ex of data[key]) {
      totalExercises++;
      const validSets = (ex.sets||[]).filter(s=>s.reps||s.weight);
      totalSets += validSets.length;
      freqMap[ex.name] = (freqMap[ex.name] || 0) + 1;
    }
  }

  const top = Object.entries(freqMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxFreq = top[0]?.[1] || 1;

  // streak
  let streak = 0;
  const sd = new Date();
  while (true) {
    const k = dateToKey(sd);
    if (!data[k]) break;
    streak++;
    sd.setDate(sd.getDate() - 1);
  }

  // Weekly stats (Monday-start)
  const today = new Date();
  const monday = getMondayOfWeek(today);
  const todayKeyStr = todayKey();
  const WEEK_LABELS = ['月','火','水','木','金','土','日'];
  const weekKeys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    weekKeys.push(dateToKey(d));
  }
  const weekTrainingDays = weekKeys.filter(k => data[k]).length;

  // Volume stats
  const weekData = {};
  for (const k of weekKeys) { if (data[k]) weekData[k] = data[k]; }
  const weekVolume = calcVolume(weekData);
  const totalVolume = calcVolume(data);

  const area = document.getElementById('stats-area');

  // Build weekly grid
  const weekGridHTML = weekKeys.map((k, i) => {
    const trained = !!data[k];
    const isToday = k === todayKeyStr;
    const dotClass = ['week-day-dot', trained ? 'trained' : '', isToday && !trained ? 'today-ring' : ''].filter(Boolean).join(' ');
    return `
      <div class="week-day-cell">
        <div class="${dotClass}">${trained ? '✓' : ''}</div>
        <div class="week-day-label">${WEEK_LABELS[i]}</div>
      </div>
    `;
  }).join('');

  area.innerHTML = `
    <div class="stats-card">
      <div class="stats-card-title">今週のトレーニング（月〜日）</div>
      <div class="stats-card-value stats-small">${weekTrainingDays}<span style="font-size:16px;font-weight:400;color:var(--muted)"> / 7回</span></div>
      <div class="week-grid">${weekGridHTML}</div>
    </div>

    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">今週のボリューム</div>
        <div class="stats-card-value stats-small">${fmtNum(weekVolume)}</div>
        <div class="stats-card-sub">kg</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">累計ボリューム</div>
        <div class="stats-card-value stats-small">${fmtNum(totalVolume)}</div>
        <div class="stats-card-sub">kg</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">トレーニング日数</div>
        <div class="stats-card-value stats-small">${totalDays}</div>
        <div class="stats-card-sub">日間</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">連続記録</div>
        <div class="stats-card-value stats-small">${streak}</div>
        <div class="stats-card-sub">日連続 🔥</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">合計種目数</div>
        <div class="stats-card-value stats-small">${totalExercises}</div>
        <div class="stats-card-sub">エクサイズ</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">合計セット数</div>
        <div class="stats-card-value stats-small">${totalSets}</div>
        <div class="stats-card-sub">セット</div>
      </div>
    </div>

    ${top.length ? `
    <div class="stats-card">
      <div class="stats-card-title">よくやる種目</div>
      ${top.map(([name, count]) => `
        <div class="exercise-freq-item">
          <span style="font-size:14px;font-weight:600">${esc(name)}</span>
          <div class="freq-bar-wrap">
            <div class="freq-bar" style="width:${Math.max(20, count/maxFreq*80)}px"></div>
            <span class="freq-count">${count}回</span>
          </div>
        </div>
      `).join('')}
    </div>` : `<div class="empty-state"><div class="emoji">📊</div><p>まだデータがありません</p></div>`}

    <div class="stats-card">
      <div class="stats-card-title">バックアップ・インポート</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">データをJSONファイルで保存・復元できます</div>
      <div class="backup-btns">
        <button class="btn-backup btn-export" onclick="exportData()">⬇ エクスポート</button>
        <button class="btn-backup btn-import" onclick="document.getElementById('import-file-input').click()">⬆ インポート</button>
      </div>
    </div>
  `;
}

// ===== BACKUP / IMPORT =====
function exportData() {
  const data = loadData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'workout-log-' + todayKey() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!isValidWorkoutData(imported)) throw new Error('invalid');
      const count = Object.keys(imported).length;
      if (!confirm(count + '日分のデータが見つかりました。現在のデータと統合してインポートしますか？\n（同じ日のデータはインポート側で上書きされます）')) return;
      const existing = loadData();
      const merged = Object.assign({}, existing, imported);
      saveData(merged);
      renderToday();
      renderHistory();
      renderStats();
      alert('インポートが完了しました（' + count + '日分）');
    } catch {
      alert('ファイルの読み込みに失敗しました。有効なバックアップJSONファイルを選択してください。');
    }
  };
  reader.readAsText(file);
}

function isValidWorkoutData(obj) {
  if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) return false;
  for (const [key, val] of Object.entries(obj)) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(key)) return false;
    if (!Array.isArray(val)) return false;
    for (const ex of val) {
      if (typeof ex !== 'object' || ex === null) return false;
      if (typeof ex.name !== 'string' || ex.name.length > 200) return false;
      if (ex.memo !== undefined && typeof ex.memo !== 'string') return false;
      if (ex.sets !== undefined && !Array.isArray(ex.sets)) return false;
    }
  }
  return true;
}

// ===== TABS =====
function switchTab(name) {
  ['today','history','stats'].forEach(t => {
    document.getElementById('screen-'+t).classList.toggle('active', t===name);
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
  });
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
}

// ===== UTILS =====
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
renderToday();
</script>
